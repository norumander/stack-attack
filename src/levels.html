<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack Attack — Select Mode</title>
  <link rel="stylesheet" href="./auth/auth.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--pi-bg-2);
      color: var(--pi-cream);
      font-family: var(--pi-font-display);
    }
    .page {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 28px 56px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: var(--pi-font-display);
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--pi-pink);
    }
    .top .back { color: var(--pi-cream); text-decoration: none; font-size: 16px; }
    .top .back:hover { color: var(--pi-yellow); }
    .top .back:focus-visible { outline: 3px solid var(--pi-yellow); outline-offset: 3px; }

    h1.title {
      font-family: var(--pi-font-display);
      font-size: clamp(22px, 4.2vw, 36px);
      color: var(--pi-yellow);
      margin: 32px 0 32px;
      text-shadow: 3px 3px 0 var(--pi-magenta), 5px 5px 0 var(--pi-ink);
      letter-spacing: 0.06em;
    }

    .tagline {
      font-family: var(--pi-font-display);
      font-size: 16px;
      letter-spacing: 0.28em;
      color: var(--pi-pink);
      text-transform: uppercase;
      margin: 0 0 28px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px;
    }
    @media (max-width: 900px) {
      .mode-grid { grid-template-columns: 1fr; }
    }

    .mode-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 22px 26px;
      background: var(--pi-navy);
      border: 3px solid var(--pi-ink);
      box-shadow: 8px 8px 0 var(--pi-magenta);
      text-decoration: none;
      color: var(--pi-cream);
      transition: transform 80ms steps(2), filter 80ms steps(2);
    }
    .mode-card:hover { transform: translate(-2px, -2px); filter: brightness(1.05); }
    .mode-card:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--pi-magenta); }
    .mode-card:focus-visible { outline: 3px solid var(--pi-yellow); outline-offset: 3px; }

    .mode-icon {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--pi-bg-3);
      border: 3px solid var(--pi-ink);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .mode-icon img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .mode-icon-glyph {
      font-family: var(--pi-font-display);
      font-size: clamp(54px, 10vw, 96px);
      line-height: 1;
      color: var(--pi-cream);
      text-shadow: 3px 3px 0 var(--pi-ink);
    }
    /* Press Start 2P draws `+` narrower and lower than `?`, so scale it
       up to match the optical size of the other mode glyphs. */
    .mode-icon-glyph--plus {
      transform: scale(1.5);
      transform-origin: center center;
      display: inline-block;
    }

    .mode-card--campaign .mode-icon { background: var(--pi-cyan); }
    .mode-card--diagnose .mode-icon { background: var(--pi-orange); }
    .mode-card--sandbox  .mode-icon { background: var(--pi-peach); }

    .mode-name {
      margin-top: 22px;
      padding: 10px 18px;
      font-family: var(--pi-font-display);
      font-size: 18px;
      color: var(--pi-navy);
      background: var(--pi-peach);
      border: 3px solid var(--pi-ink);
      box-shadow: 4px 4px 0 var(--pi-magenta);
      letter-spacing: 0.08em;
    }
    .mode-card--campaign .mode-name { background: var(--pi-cyan); }
    .mode-card--diagnose .mode-name { background: var(--pi-orange); }
    .mode-card--sandbox  .mode-name { background: var(--pi-peach); }

    .mode-desc {
      font-family: var(--pi-font-body);
      font-size: 18px;
      color: var(--pi-cream);
      margin-top: 16px;
      letter-spacing: 0.02em;
      line-height: 1.3;
      text-align: center;
      opacity: 0.9;
    }

    @media (prefers-reduced-motion: reduce) {
      .mode-card, .mode-card:hover, .mode-card:focus-visible, .mode-card:active {
        transition: none !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <a class="back" href="./index.html">&lt; BACK</a>
    </div>

    <h1 class="title">STACK ATTACK</h1>
    <p class="tagline">SELECT MODE</p>

    <nav class="mode-grid" aria-label="Game modes">
      <a class="mode-card mode-card--campaign" href="./campaign.html" aria-label="Campaign mode">
        <div class="mode-icon">
          <img src="./assets/stack-attack/client-typing.gif" alt="" aria-hidden="true" />
        </div>
        <div class="mode-name">CAMPAIGN</div>
        <p class="mode-desc">Build from scratch. Survive launch day, the viral moment, global scale.</p>
      </a>

      <a class="mode-card mode-card--diagnose" href="./diagnose-levels.html" aria-label="Diagnose mode">
        <div class="mode-icon">
          <span class="mode-icon-glyph">?</span>
        </div>
        <div class="mode-name">DIAGNOSE</div>
        <p class="mode-desc">Inherit a broken system. Find the bottleneck before the SLA breaks.</p>
      </a>

      <a class="mode-card mode-card--sandbox" href="./sandbox.html" aria-label="Sandbox mode">
        <div class="mode-icon">
          <span class="mode-icon-glyph mode-icon-glyph--plus">+</span>
        </div>
        <div class="mode-name">SANDBOX</div>
        <p class="mode-desc">Unlimited budget, no SLA. Wire anything and watch traffic flow.</p>
      </a>
    </nav>
  </div>
  <script type="module" src="./crt-overlay.ts"></script>
  <script type="module" src="./levels-boot.ts"></script>
</body>
</html>
