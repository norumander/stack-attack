<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainLift</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a1420;
      color: #ccddee;
      font-family: system-ui, -apple-system, "Segoe UI", monospace, sans-serif;
      overflow: hidden;
    }
    .landing {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }
    .title {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #aef7ff;
      text-shadow: 0 0 20px rgba(94, 240, 255, 0.4);
    }
    .subtitle {
      font-size: 16px;
      color: #8b8fa3;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: -24px;
    }
    .play-btn {
      padding: 16px 56px;
      background: transparent;
      color: #aef7ff;
      border: 2px solid #aef7ff;
      border-radius: 4px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.3em;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .play-btn:hover {
      background: #aef7ff;
      color: #0a1420;
      box-shadow: 0 0 24px rgba(94, 240, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="title">BRAINLIFT</div>
    <div class="subtitle">System Architecture Tower Defense</div>
    <a href="./levels.html" class="play-btn">PLAY</a>
  </div>
</body>
</html>
