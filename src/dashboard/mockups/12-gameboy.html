<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stack Attack — Game Boy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--g0:#0f380f;--g1:#306230;--g2:#8bac0f;--g3:#9bbc0f}
body{background:#8a8a8a;font-family:'Press Start 2P',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;image-rendering:pixelated;padding:20px}

/* Game Boy screen bezel */
.gb-shell{background:#0f380f;border:6px solid #0a2a0a;border-radius:12px;padding:8px;max-width:1100px;width:100%;box-shadow:inset 0 0 0 2px #1a4a1a,4px 4px 0 rgba(0,0,0,0.3)}
.gb-screen{background:var(--g3);position:relative;overflow:hidden;border:3px solid var(--g0)}

/* LCD grid overlay */
.gb-screen::after{content:'';position:absolute;inset:0;background-image:
  repeating-linear-gradient(0deg,rgba(15,56,15,0.1) 0px,rgba(15,56,15,0.1) 1px,transparent 1px,transparent 3px),
  repeating-linear-gradient(90deg,rgba(15,56,15,0.1) 0px,rgba(15,56,15,0.1) 1px,transparent 1px,transparent 3px);
pointer-events:none;z-index:9999}

/* Green tint overlay */
.gb-screen::before{content:'';position:absolute;inset:0;background:rgba(139,172,15,0.06);pointer-events:none;z-index:9998}

/* Top Bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--g1);border-bottom:3px solid var(--g0)}
.topbar h1{font-size:8px;color:var(--g3);letter-spacing:1px}
.topbar-stats{display:flex;gap:6px;font-size:7px}
.stat{padding:2px 5px;border:2px solid var(--g0);background:var(--g0);color:var(--g2)}
.stat-label{color:var(--g1);font-size:6px;margin-right:2px}

/* Layout */
.main{display:grid;grid-template-columns:120px 1fr;grid-template-rows:1fr 100px;height:500px;gap:0}

/* Sidebar */
.sidebar{background:var(--g1);border-right:3px solid var(--g0);padding:4px;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.sidebar h2{font-size:6px;color:var(--g3);margin-bottom:2px;padding-bottom:2px;border-bottom:2px solid var(--g0);letter-spacing:1px}
.comp-tile{background:var(--g0);border:2px solid var(--g1);padding:4px 5px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.comp-tile:hover{background:var(--g1);border-color:var(--g3)}
.comp-tile .name{font-size:7px;color:var(--g3)}
.comp-tile .cost{font-size:6px;color:var(--g2)}
.ready-btn{margin-top:auto;padding:6px;background:var(--g2);color:var(--g0);border:3px solid var(--g0);font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;letter-spacing:1px;text-align:center}
.ready-btn:hover{background:var(--g3)}
.ready-btn:active{background:var(--g1);color:var(--g3)}

/* Board */
.board{background:var(--g3);position:relative;overflow:hidden}
/* Subtle dot grid on board */
.board::before{content:'';position:absolute;inset:0;background-image:
  radial-gradient(circle,var(--g2) 0.5px,transparent 0.5px);
background-size:12px 12px;opacity:0.4;pointer-events:none}
.board svg.connections{width:100%;height:100%;position:absolute;inset:0}
.board svg.connections line{stroke:var(--g1);stroke-width:2}

/* Nodes */
.node{position:absolute;transform:translate(-50%,-50%);z-index:2;display:flex;flex-direction:column;align-items:center}
.node .icon-wrap{width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.node .icon-wrap svg{image-rendering:pixelated;overflow:visible}
.node .label{font-size:6px;color:var(--g0);white-space:nowrap;margin-top:1px;text-align:center}
/* Health bar: 4 segments */
.node .health{width:32px;height:6px;background:var(--g0);margin-top:2px;display:flex;gap:1px;padding:1px;border:2px solid var(--g0)}
.seg{width:6px;height:100%;flex-shrink:0}
.seg.s3{background:var(--g3)}
.seg.s2{background:var(--g2)}
.seg.s1{background:var(--g1)}
.seg.s0{background:var(--g0)}

/* Bottom Charts */
.charts{grid-column:1/-1;background:var(--g1);border-top:3px solid var(--g0);display:grid;grid-template-columns:1fr 140px;gap:0;padding:6px 8px}
.chart{position:relative}
.chart h3{font-size:6px;color:var(--g2);margin-bottom:4px;letter-spacing:1px}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:60px;padding:2px 0;border-bottom:2px solid var(--g0)}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:2px}
.bar{width:14px;background:var(--g2);border:1px solid var(--g0)}
.bar.accent{background:var(--g3)}
.bar-label{font-size:5px;color:var(--g2)}

/* Reliability gauge */
.gauge{display:flex;flex-direction:column;align-items:center;justify-content:center;border-left:3px solid var(--g0);padding-left:8px}
.gauge-value{font-size:14px;color:var(--g3);letter-spacing:1px}
.gauge-unit{font-size:6px;color:var(--g2);margin-top:2px}
.gauge-label{font-size:6px;color:var(--g2);margin-top:4px;letter-spacing:1px}
.gauge-bar{width:80px;height:8px;background:var(--g0);border:2px solid var(--g0);margin-top:4px;display:flex;padding:1px;gap:1px}
.gauge-bar .gseg{width:8px;height:100%;flex-shrink:0}
.gauge-bar .gseg.on{background:var(--g3)}
.gauge-bar .gseg.off{background:var(--g1)}
</style>
</head>
<body>
<div class="gb-shell">
<div class="gb-screen">

<!-- Top Bar -->
<div class="topbar">
  <h1>STACK ATTACK</h1>
  <div class="topbar-stats">
    <div class="stat"><span class="stat-label">W</span>3</div>
    <div class="stat"><span class="stat-label">PH</span>BUILD</div>
    <div class="stat"><span class="stat-label">$</span>450</div>
    <div class="stat"><span class="stat-label">AV</span>95%</div>
    <div class="stat"><span class="stat-label">LT</span>3.2</div>
  </div>
</div>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>PARTS</h2>
    <div class="comp-tile"><span class="name">SRV</span><span class="cost">$100</span></div>
    <div class="comp-tile"><span class="name">DB</span><span class="cost">$200</span></div>
    <div class="comp-tile"><span class="name">CCH</span><span class="cost">$150</span></div>
    <div class="comp-tile"><span class="name">LB</span><span class="cost">$175</span></div>
    <div class="comp-tile"><span class="name">CDN</span><span class="cost">$200</span></div>
    <div class="comp-tile"><span class="name">GW</span><span class="cost">$250</span></div>
    <div class="comp-tile"><span class="name">QUE</span><span class="cost">$125</span></div>
    <button class="ready-btn">READY</button>
  </div>

  <!-- Board -->
  <div class="board">
    <svg class="connections">
      <!-- Client -> LB -->
      <line x1="13%" y1="50%" x2="34%" y2="50%"/>
      <!-- LB -> Server1 -->
      <line x1="34%" y1="50%" x2="57%" y2="33%"/>
      <!-- LB -> Server2 -->
      <line x1="34%" y1="50%" x2="57%" y2="67%"/>
      <!-- Server1 -> DB -->
      <line x1="57%" y1="33%" x2="82%" y2="50%"/>
      <!-- Server2 -> DB -->
      <line x1="57%" y1="67%" x2="82%" y2="50%"/>
      <!-- Cache -> LB -->
      <line x1="34%" y1="18%" x2="34%" y2="50%"/>
    </svg>

    <!-- Client Node -->
    <div class="node" style="left:13%;top:50%">
      <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 8 8">
          <!-- Monitor outline -->
          <rect x="1" y="1" width="6" height="4" fill="var(--g0)"/>
          <!-- Screen -->
          <rect x="2" y="2" width="4" height="2" fill="var(--g3)"/>
          <!-- Stand -->
          <rect x="3" y="5" width="2" height="1" fill="var(--g0)"/>
          <!-- Base -->
          <rect x="2" y="6" width="4" height="1" fill="var(--g0)"/>
        </svg>
      </div>
      <div class="label">CLIENT</div>
      <div class="health"><div class="seg s3"></div><div class="seg s3"></div><div class="seg s3"></div><div class="seg s3"></div></div>
    </div>

    <!-- Load Balancer Node -->
    <div class="node" style="left:34%;top:50%">
      <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 8 8">
          <!-- Diamond shape -->
          <rect x="3" y="0" width="2" height="1" fill="var(--g0)"/>
          <rect x="2" y="1" width="4" height="1" fill="var(--g0)"/>
          <rect x="1" y="2" width="6" height="1" fill="var(--g0)"/>
          <rect x="0" y="3" width="8" height="2" fill="var(--g0)"/>
          <!-- Inner diamond lighter -->
          <rect x="3" y="3" width="2" height="1" fill="var(--g2)"/>
          <rect x="1" y="5" width="6" height="1" fill="var(--g0)"/>
          <rect x="2" y="6" width="4" height="1" fill="var(--g0)"/>
          <rect x="3" y="7" width="2" height="1" fill="var(--g0)"/>
          <!-- Arrow pixels left -->
          <rect x="0" y="3" width="1" height="1" fill="var(--g2)"/>
          <!-- Arrow pixels right -->
          <rect x="7" y="3" width="1" height="1" fill="var(--g2)"/>
        </svg>
      </div>
      <div class="label">LB</div>
      <div class="health"><div class="seg s3"></div><div class="seg s3"></div><div class="seg s3"></div><div class="seg s2"></div></div>
    </div>

    <!-- Server 1 Node -->
    <div class="node" style="left:57%;top:33%">
      <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 8 8">
          <!-- Tall server rectangle -->
          <rect x="1" y="0" width="6" height="8" fill="var(--g0)"/>
          <!-- Drive bay stripes -->
          <rect x="2" y="1" width="4" height="1" fill="var(--g2)"/>
          <rect x="2" y="3" width="4" height="1" fill="var(--g2)"/>
          <rect x="2" y="5" width="4" height="1" fill="var(--g2)"/>
          <!-- Status lights -->
          <rect x="5" y="1" width="1" height="1" fill="var(--g3)"/>
          <rect x="5" y="3" width="1" height="1" fill="var(--g3)"/>
          <rect x="5" y="5" width="1" height="1" fill="var(--g3)"/>
        </svg>
      </div>
      <div class="label">SRV1</div>
      <div class="health"><div class="seg s3"></div><div class="seg s3"></div><div class="seg s2"></div><div class="seg s1"></div></div>
    </div>

    <!-- Server 2 Node -->
    <div class="node" style="left:57%;top:67%">
      <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 8 8">
          <!-- Tall server rectangle -->
          <rect x="1" y="0" width="6" height="8" fill="var(--g0)"/>
          <!-- Drive bay stripes -->
          <rect x="2" y="1" width="4" height="1" fill="var(--g2)"/>
          <rect x="2" y="3" width="4" height="1" fill="var(--g2)"/>
          <rect x="2" y="5" width="4" height="1" fill="var(--g2)"/>
          <!-- Status lights -->
          <rect x="5" y="1" width="1" height="1" fill="var(--g3)"/>
          <rect x="5" y="3" width="1" height="1" fill="var(--g3)"/>
          <rect x="5" y="5" width="1" height="1" fill="var(--g3)"/>
          <!-- "2" indicator pixel -->
          <rect x="6" y="0" width="1" height="1" fill="var(--g1)"/>
        </svg>
      </div>
      <div class="label">SRV2</div>
      <div class="health"><div class="seg s3"></div><div class="seg s3"></div><div class="seg s3"></div><div class="seg s3"></div></div>
    </div>

    <!-- Database Node -->
    <div class="node" style="left:82%;top:50%">
      <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 8 8">
          <!-- Barrel/cylinder shape - stepped rectangles -->
          <rect x="2" y="0" width="4" height="1" fill="var(--g0)"/>
          <rect x="1" y="1" width="6" height="1" fill="var(--g0)"/>
          <rect x="1" y="2" width="6" height="1" fill="var(--g2)"/>
          <rect x="0" y="3" width="8" height="2" fill="var(--g0)"/>
          <rect x="1" y="3" width="6" height="2" fill="var(--g2)"/>
          <rect x="1" y="5" width="6" height="1" fill="var(--g0)"/>
          <rect x="1" y="6" width="6" height="1" fill="var(--g2)"/>
          <rect x="2" y="7" width="4" height="1" fill="var(--g0)"/>
          <!-- Top ellipse highlight -->
          <rect x="3" y="0" width="2" height="1" fill="var(--g1)"/>
        </svg>
      </div>
      <div class="label">DB</div>
      <div class="health"><div class="seg s3"></div><div class="seg s3"></div><div class="seg s3"></div><div class="seg s2"></div></div>
    </div>

    <!-- Cache Node -->
    <div class="node" style="left:34%;top:18%">
      <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 8 8">
          <!-- Lightning bolt from diagonal rectangles -->
          <rect x="3" y="0" width="2" height="1" fill="var(--g0)"/>
          <rect x="4" y="0" width="2" height="1" fill="var(--g0)"/>
          <rect x="3" y="1" width="2" height="1" fill="var(--g0)"/>
          <rect x="2" y="2" width="2" height="1" fill="var(--g0)"/>
          <rect x="1" y="3" width="4" height="1" fill="var(--g0)"/>
          <rect x="2" y="3" width="3" height="1" fill="var(--g3)"/>
          <rect x="3" y="4" width="2" height="1" fill="var(--g0)"/>
          <rect x="4" y="4" width="2" height="1" fill="var(--g0)"/>
          <rect x="3" y="5" width="2" height="1" fill="var(--g0)"/>
          <rect x="2" y="6" width="2" height="1" fill="var(--g0)"/>
          <rect x="2" y="7" width="2" height="1" fill="var(--g0)"/>
        </svg>
      </div>
      <div class="label">CCH</div>
      <div class="health"><div class="seg s3"></div><div class="seg s3"></div><div class="seg s3"></div><div class="seg s3"></div></div>
    </div>
  </div>

  <!-- Bottom: Charts + Reliability -->
  <div class="charts">
    <div class="chart">
      <h3>THROUGHPUT</h3>
      <div class="bar-chart">
        <div class="bar-col"><div class="bar" style="height:30px"></div><div class="bar-label">1</div></div>
        <div class="bar-col"><div class="bar accent" style="height:38px"></div><div class="bar-label">2</div></div>
        <div class="bar-col"><div class="bar" style="height:45px"></div><div class="bar-label">3</div></div>
        <div class="bar-col"><div class="bar accent" style="height:35px"></div><div class="bar-label">4</div></div>
        <div class="bar-col"><div class="bar" style="height:50px"></div><div class="bar-label">5</div></div>
        <div class="bar-col"><div class="bar accent" style="height:42px"></div><div class="bar-label">6</div></div>
        <div class="bar-col"><div class="bar" style="height:55px"></div><div class="bar-label">7</div></div>
        <div class="bar-col"><div class="bar accent" style="height:48px"></div><div class="bar-label">8</div></div>
        <div class="bar-col"><div class="bar" style="height:40px"></div><div class="bar-label">9</div></div>
        <div class="bar-col"><div class="bar accent" style="height:52px"></div><div class="bar-label">10</div></div>
      </div>
    </div>
    <div class="gauge">
      <div class="gauge-value">99.2</div>
      <div class="gauge-unit">%</div>
      <div class="gauge-label">RELIAB</div>
      <div class="gauge-bar">
        <div class="gseg on"></div><div class="gseg on"></div><div class="gseg on"></div><div class="gseg on"></div>
        <div class="gseg on"></div><div class="gseg on"></div><div class="gseg on"></div><div class="gseg off"></div>
      </div>
    </div>
  </div>
</div>

</div><!-- gb-screen -->
</div><!-- gb-shell -->
</body>
</html>
