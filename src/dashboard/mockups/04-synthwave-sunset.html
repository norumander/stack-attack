<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stack Attack — Synthwave Sunset</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a0a2e;--surface:rgba(30,10,60,0.85);--border:rgba(255,100,200,0.2);--pink:#ff6ec7;--orange:#ff9a3c;--yellow:#ffd700;--purple:#b347d9;--cyan:#00e5ff;--chrome:#e8d5b5;--text:#f0daf0;--dim:#9a6aaa;--hot-pink:#ff2975;--orange-neon:#ff6b35;--sunset-top:#1a0a2e;--sunset-mid:#6b1d5e;--sunset-bot:#ff6a00}
body{background:linear-gradient(180deg,var(--sunset-top) 0%,var(--sunset-mid) 40%,var(--sunset-bot) 75%,#ffb347 100%);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,110,199,0.04) 3px,rgba(255,110,199,0.04) 5px);pointer-events:none;z-index:9999}

/* Top Bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(180deg,rgba(26,10,46,0.95),rgba(107,29,94,0.6));border-bottom:2px solid var(--pink);box-shadow:0 2px 30px rgba(255,110,199,0.3)}
.topbar h1{font-family:'Audiowide',sans-serif;font-size:1.2rem;background:linear-gradient(90deg,var(--orange),var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(255,110,199,0.4)}
.topbar-stats{display:flex;gap:20px;font-size:0.75rem}
.stat{display:flex;flex-direction:column;align-items:center}
.stat-label{color:var(--dim);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:600}
.stat-value{font-family:'Audiowide',sans-serif;font-weight:400;font-size:0.85rem}
.stat-value.pink{color:var(--pink);text-shadow:0 0 12px rgba(255,110,199,0.6)}
.stat-value.orange{color:var(--orange);text-shadow:0 0 12px rgba(255,154,60,0.6)}
.stat-value.yellow{color:var(--yellow);text-shadow:0 0 12px rgba(255,215,0,0.5)}
.stat-value.chrome{color:var(--chrome)}
.sla-ok{color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,0.5)}
.sla-ok::after{content:' \2713'}

/* Layout */
.main{display:grid;grid-template-columns:200px 1fr;grid-template-rows:1fr 180px;height:calc(100vh - 54px);gap:0}

/* Sidebar */
.sidebar{background:var(--surface);border-right:2px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:8px;backdrop-filter:blur(10px)}
.sidebar h2{font-family:'Audiowide',sans-serif;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--pink);margin-bottom:8px}
.comp-tile{background:linear-gradient(135deg,rgba(255,110,199,0.08),rgba(255,154,60,0.05));border:1px solid rgba(255,110,199,0.2);border-radius:4px;padding:10px;cursor:pointer;transition:all 0.2s}
.comp-tile:hover{background:linear-gradient(135deg,rgba(255,110,199,0.2),rgba(255,154,60,0.12));border-color:var(--pink);box-shadow:0 0 20px rgba(255,110,199,0.25)}
.comp-tile .name{font-family:'Audiowide',sans-serif;font-size:0.65rem;color:var(--chrome)}
.comp-tile .cost{font-size:0.65rem;color:var(--orange);font-weight:700}
.ready-btn{margin-top:auto;padding:14px;background:linear-gradient(135deg,var(--orange-neon),var(--hot-pink));color:#fff;border:none;border-radius:4px;font-family:'Audiowide',sans-serif;font-size:0.85rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;position:relative;overflow:hidden;box-shadow:0 0 25px rgba(255,45,149,0.4)}
.ready-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);transform:translateX(-100%);animation:shimmer 2s infinite}
@keyframes shimmer{to{transform:translateX(100%)}}

/* Board */
.board{position:relative;overflow:hidden;background:transparent}
/* Perspective grid */
.board::before{content:'';position:absolute;left:0;right:0;bottom:0;height:55%;background:
  repeating-linear-gradient(90deg,rgba(255,110,199,0.15) 0px,transparent 1px,transparent 60px),
  repeating-linear-gradient(180deg,rgba(255,110,199,0.15) 0px,transparent 1px,transparent 60px);
  transform:perspective(400px) rotateX(55deg);transform-origin:bottom center}
.board::after{content:'';position:absolute;left:0;right:0;bottom:45%;height:6px;background:linear-gradient(90deg,var(--orange),var(--pink),var(--purple));box-shadow:0 0 40px 8px rgba(255,110,199,0.4);filter:blur(1px)}
/* Sun */
.sun{position:absolute;left:50%;bottom:42%;transform:translateX(-50%);width:180px;height:90px;border-radius:180px 180px 0 0;background:linear-gradient(180deg,var(--yellow),var(--orange) 60%,var(--hot-pink));box-shadow:0 0 80px 20px rgba(255,154,60,0.3);overflow:hidden}
.sun-lines{position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent,transparent 8px,rgba(26,10,46,0.5) 8px,rgba(26,10,46,0.5) 12px)}
.board svg.connections{width:100%;height:100%;position:absolute;inset:0;z-index:1}
.board svg.connections line{stroke:rgba(255,110,199,0.4);stroke-width:2}
.board svg.connections line.active{animation:line-glow 1.5s ease-in-out infinite alternate}
@keyframes line-glow{from{stroke:rgba(255,110,199,0.3);stroke-width:2}to{stroke:rgba(255,110,199,0.9);stroke-width:3}}

/* Icon Nodes */
.node{position:absolute;transform:translate(-50%,-50%);z-index:2;display:flex;flex-direction:column;align-items:center;width:80px;height:70px;cursor:pointer}
.node svg.icon{width:40px;height:40px;flex-shrink:0}
.node .label{font-family:'Audiowide',sans-serif;font-size:0.5rem;color:var(--chrome);white-space:nowrap;margin-top:3px;text-shadow:0 0 8px rgba(232,213,181,0.3)}
.node .health{height:4px;width:60px;background:rgba(255,110,199,0.1);border-radius:2px;margin-top:3px;overflow:hidden}
.node .health-fill{height:100%;border-radius:2px;transition:width 0.3s}
.node .health-fill.good{background:var(--cyan);box-shadow:0 0 6px rgba(0,229,255,0.5)}
.node .health-fill.warn{background:var(--yellow);box-shadow:0 0 6px rgba(255,215,0,0.5)}
.node .health-fill.bad{background:var(--hot-pink);box-shadow:0 0 6px rgba(255,45,149,0.5)}
.node.db .label{color:var(--purple);text-shadow:0 0 8px rgba(179,71,217,0.4)}
.node.cache .label{color:var(--yellow);text-shadow:0 0 8px rgba(255,215,0,0.4)}

/* Charts */
.charts{grid-column:1/-1;background:rgba(26,10,46,0.92);border-top:2px solid var(--border);display:grid;grid-template-columns:1fr 1fr 200px;gap:1px;padding:12px 16px;backdrop-filter:blur(10px)}
.chart{position:relative}
.chart h3{font-family:'Audiowide',sans-serif;font-size:0.5rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);margin-bottom:8px}
.chart canvas{width:100%;height:120px}
.gauge{display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-circle{width:100px;height:100px;border-radius:50%;border:3px solid rgba(255,110,199,0.2);position:relative;display:flex;align-items:center;justify-content:center}
.gauge-circle::before{content:'';position:absolute;inset:4px;border-radius:50%;border:3px solid transparent;border-top-color:var(--cyan);border-right-color:var(--cyan);border-bottom-color:var(--cyan);animation:gauge-spin 3s linear infinite}
@keyframes gauge-spin{to{transform:rotate(360deg)}}
.gauge-value{font-family:'Audiowide',sans-serif;font-size:1.2rem;color:var(--cyan);text-shadow:0 0 15px rgba(0,229,255,0.5)}
.gauge-label{font-size:0.6rem;color:var(--dim);margin-top:6px;text-transform:uppercase;letter-spacing:0.1em}
</style>
</head>
<body>
<div class="topbar">
  <h1>STACK ATTACK</h1>
  <div class="topbar-stats">
    <div class="stat"><span class="stat-label">Wave</span><span class="stat-value pink">3 / 10</span></div>
    <div class="stat"><span class="stat-label">Phase</span><span class="stat-value orange">BUILD</span></div>
    <div class="stat"><span class="stat-label">Budget</span><span class="stat-value yellow">$450</span></div>
    <div class="stat"><span class="stat-label">Availability</span><span class="stat-value sla-ok">95.2%</span></div>
    <div class="stat"><span class="stat-label">Latency</span><span class="stat-value sla-ok">3.2</span></div>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <h2>Components</h2>
    <div class="comp-tile"><div class="name">Server</div><div class="cost">$100</div></div>
    <div class="comp-tile"><div class="name">Database</div><div class="cost">$200</div></div>
    <div class="comp-tile"><div class="name">Cache</div><div class="cost">$150</div></div>
    <div class="comp-tile"><div class="name">Load Balancer</div><div class="cost">$175</div></div>
    <div class="comp-tile"><div class="name">CDN</div><div class="cost">$200</div></div>
    <div class="comp-tile"><div class="name">API Gateway</div><div class="cost">$250</div></div>
    <div class="comp-tile"><div class="name">Queue</div><div class="cost">$125</div></div>
    <button class="ready-btn">&#9654; READY</button>
  </div>
  <div class="board">
    <div class="sun"><div class="sun-lines"></div></div>

    <!-- Glow filter + chrome gradient definitions -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <filter id="synthglow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="synthglow-yellow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <linearGradient id="chrome-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f0e0c0"/>
          <stop offset="30%" stop-color="#e8d5b5"/>
          <stop offset="50%" stop-color="#c8a878"/>
          <stop offset="70%" stop-color="#e8d5b5"/>
          <stop offset="100%" stop-color="#f0e0c0"/>
        </linearGradient>
        <linearGradient id="chrome-pink" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff6ec7" stop-opacity="0.3"/>
          <stop offset="50%" stop-color="#ff2975" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#ff6b35" stop-opacity="0.3"/>
        </linearGradient>
        <pattern id="retro-grid" width="8" height="8" patternUnits="userSpaceOnUse">
          <line x1="0" y1="0" x2="0" y2="8" stroke="#ff2975" stroke-width="0.3" opacity="0.3"/>
          <line x1="0" y1="0" x2="8" y2="0" stroke="#ff2975" stroke-width="0.3" opacity="0.3"/>
        </pattern>
      </defs>
    </svg>

    <!-- Connection lines -->
    <svg class="connections">
      <line x1="13%" y1="50%" x2="34%" y2="50%" class="active"/>
      <line x1="34%" y1="50%" x2="57%" y2="33%"/>
      <line x1="34%" y1="50%" x2="57%" y2="67%"/>
      <line x1="57%" y1="33%" x2="82%" y2="50%"/>
      <line x1="57%" y1="67%" x2="82%" y2="50%"/>
      <line x1="34%" y1="50%" x2="34%" y2="18%" style="stroke:rgba(255,215,0,0.3)"/>
    </svg>

    <!-- CLIENT: Monitor with chrome/neon -->
    <div class="node" style="left:13%;top:50%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#synthglow)">
        <rect x="5" y="4" width="30" height="22" rx="2" stroke="#ff2975" stroke-width="2" fill="url(#chrome-pink)"/>
        <rect x="8" y="7" width="24" height="16" rx="1" fill="url(#retro-grid)"/>
        <line x1="12" y1="30" x2="28" y2="30" stroke="#ff6b35" stroke-width="2"/>
        <line x1="20" y1="26" x2="20" y2="30" stroke="#ff6b35" stroke-width="2"/>
        <!-- Screen content glow -->
        <line x1="11" y1="12" x2="22" y2="12" stroke="#ff2975" stroke-width="0.8" opacity="0.6"/>
        <line x1="11" y1="15" x2="18" y2="15" stroke="#ff6b35" stroke-width="0.8" opacity="0.5"/>
        <line x1="11" y1="18" x2="25" y2="18" stroke="#ff2975" stroke-width="0.8" opacity="0.4"/>
      </svg>
      <div class="label">CLIENT</div>
      <div class="health"><div class="health-fill good" style="width:100%"></div></div>
    </div>

    <!-- LOAD BALANCER: Diamond with split arrows -->
    <div class="node" style="left:34%;top:50%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#synthglow)">
        <polygon points="20,3 37,20 20,37 3,20" stroke="#ff2975" stroke-width="2" fill="url(#chrome-pink)"/>
        <polygon points="20,8 32,20 20,32 8,20" fill="url(#retro-grid)" stroke="none"/>
        <line x1="20" y1="20" x2="7" y2="13" stroke="#ff6b35" stroke-width="1.5"/>
        <line x1="20" y1="20" x2="7" y2="27" stroke="#ff6b35" stroke-width="1.5"/>
        <line x1="20" y1="20" x2="33" y2="13" stroke="#ff6b35" stroke-width="1.5"/>
        <line x1="20" y1="20" x2="33" y2="27" stroke="#ff6b35" stroke-width="1.5"/>
        <polygon points="5,12 9,13 7,16" fill="#ff6b35"/>
        <polygon points="5,28 9,27 7,24" fill="#ff6b35"/>
        <polygon points="35,12 31,13 33,16" fill="#ff6b35"/>
        <polygon points="35,28 31,27 33,24" fill="#ff6b35"/>
      </svg>
      <div class="label">LOAD BALANCER</div>
      <div class="health"><div class="health-fill good" style="width:100%"></div></div>
    </div>

    <!-- SERVER 1: Rack server -->
    <div class="node" style="left:57%;top:33%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#synthglow)">
        <rect x="6" y="3" width="28" height="34" rx="2" stroke="#ff2975" stroke-width="2" fill="url(#chrome-pink)"/>
        <rect x="8" y="5" width="24" height="30" fill="url(#retro-grid)"/>
        <line x1="6" y1="14" x2="34" y2="14" stroke="#ff2975" stroke-width="1"/>
        <line x1="6" y1="25" x2="34" y2="25" stroke="#ff2975" stroke-width="1"/>
        <rect x="10" y="7" width="16" height="3" rx="1" fill="rgba(255,41,117,0.2)" stroke="#ff6b35" stroke-width="0.5"/>
        <rect x="10" y="18" width="16" height="3" rx="1" fill="rgba(255,41,117,0.2)" stroke="#ff6b35" stroke-width="0.5"/>
        <rect x="10" y="29" width="16" height="3" rx="1" fill="rgba(255,41,117,0.2)" stroke="#ff6b35" stroke-width="0.5"/>
        <circle cx="30" cy="8.5" r="1.5" fill="#00e5ff"/>
        <circle cx="30" cy="19.5" r="1.5" fill="#00e5ff"/>
        <circle cx="30" cy="30.5" r="1.5" fill="#00e5ff"/>
      </svg>
      <div class="label">SERVER 1</div>
      <div class="health"><div class="health-fill good" style="width:92%"></div></div>
    </div>

    <!-- SERVER 2: Rack server with "2" badge -->
    <div class="node" style="left:57%;top:67%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#synthglow)">
        <rect x="6" y="3" width="28" height="34" rx="2" stroke="#ff2975" stroke-width="2" fill="url(#chrome-pink)"/>
        <rect x="8" y="5" width="24" height="30" fill="url(#retro-grid)"/>
        <line x1="6" y1="14" x2="34" y2="14" stroke="#ff2975" stroke-width="1"/>
        <line x1="6" y1="25" x2="34" y2="25" stroke="#ff2975" stroke-width="1"/>
        <rect x="10" y="7" width="16" height="3" rx="1" fill="rgba(255,41,117,0.2)" stroke="#ff6b35" stroke-width="0.5"/>
        <rect x="10" y="18" width="16" height="3" rx="1" fill="rgba(255,41,117,0.2)" stroke="#ff6b35" stroke-width="0.5"/>
        <rect x="10" y="29" width="16" height="3" rx="1" fill="rgba(255,41,117,0.2)" stroke="#ff6b35" stroke-width="0.5"/>
        <circle cx="30" cy="8.5" r="1.5" fill="#ffd700"/>
        <circle cx="30" cy="19.5" r="1.5" fill="#ffd700"/>
        <circle cx="30" cy="30.5" r="1.5" fill="#ffd700"/>
        <!-- "2" badge -->
        <circle cx="34" cy="34" r="5.5" fill="#ff2975" stroke="#ff6b35" stroke-width="1"/>
        <text x="34" y="37" text-anchor="middle" fill="#fff" font-family="Audiowide,sans-serif" font-size="7">2</text>
      </svg>
      <div class="label">SERVER 2</div>
      <div class="health"><div class="health-fill warn" style="width:65%"></div></div>
    </div>

    <!-- DATABASE: Cylinder with purple neon -->
    <div class="node db" style="left:82%;top:50%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#synthglow)">
        <ellipse cx="20" cy="8" rx="14" ry="5" stroke="#b347d9" stroke-width="2" fill="rgba(179,71,217,0.15)"/>
        <line x1="6" y1="8" x2="6" y2="32" stroke="#b347d9" stroke-width="2"/>
        <line x1="34" y1="8" x2="34" y2="32" stroke="#b347d9" stroke-width="2"/>
        <ellipse cx="20" cy="32" rx="14" ry="5" stroke="#b347d9" stroke-width="2" fill="rgba(179,71,217,0.15)"/>
        <rect x="7" y="10" width="26" height="20" fill="url(#retro-grid)"/>
        <ellipse cx="20" cy="20" rx="14" ry="5" stroke="#b347d9" stroke-width="1" opacity="0.4"/>
        <!-- Data lines -->
        <line x1="12" y1="15" x2="28" y2="15" stroke="#b347d9" stroke-width="0.5" opacity="0.3"/>
        <line x1="10" y1="26" x2="30" y2="26" stroke="#b347d9" stroke-width="0.5" opacity="0.3"/>
      </svg>
      <div class="label">DATABASE</div>
      <div class="health"><div class="health-fill good" style="width:88%"></div></div>
    </div>

    <!-- CACHE: Lightning bolt in circle with yellow neon -->
    <div class="node cache" style="left:34%;top:18%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#synthglow-yellow)">
        <circle cx="20" cy="20" r="17" stroke="#ffd700" stroke-width="2" fill="rgba(255,215,0,0.06)"/>
        <circle cx="20" cy="20" r="14" fill="url(#retro-grid)"/>
        <polygon points="22,5 13,22 19,22 17,36 27,18 21,18" fill="#ffd700" stroke="#ff6b35" stroke-width="0.5" stroke-linejoin="round"/>
      </svg>
      <div class="label">CACHE</div>
      <div class="health"><div class="health-fill good" style="width:100%"></div></div>
    </div>
  </div>
  <div class="charts">
    <div class="chart">
      <h3>Throughput</h3>
      <canvas id="c1"></canvas>
    </div>
    <div class="chart">
      <h3>Latency</h3>
      <canvas id="c2"></canvas>
    </div>
    <div class="gauge">
      <div class="gauge-circle"><span class="gauge-value">95%</span></div>
      <div class="gauge-label">Reliability</div>
    </div>
  </div>
</div>
<script>
function drawChart(id,color1,color2){
  const c=document.getElementById(id),ctx=c.getContext('2d');
  c.width=c.offsetWidth*2;c.height=240;ctx.scale(2,1);
  const w=c.offsetWidth,h=120;
  const pts=Array.from({length:50},(_,i)=>Math.sin(i*0.3)*20+50+Math.random()*10);
  ctx.beginPath();ctx.moveTo(0,h);
  pts.forEach((p,i)=>{ctx.lineTo(i*(w/50),h-p)});
  ctx.lineTo(w,h);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,color1+'44');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();pts.forEach((p,i)=>{i?ctx.lineTo(i*(w/50),h-p):ctx.moveTo(0,h-p)});
  ctx.strokeStyle=color1;ctx.lineWidth=2;ctx.stroke();
  if(color2){
    const pts2=Array.from({length:50},(_,i)=>Math.sin(i*0.5+1)*8+15+Math.random()*5);
    ctx.beginPath();pts2.forEach((p,i)=>{i?ctx.lineTo(i*(w/50),h-p):ctx.moveTo(0,h-p)});
    ctx.strokeStyle=color2;ctx.lineWidth=1.5;ctx.stroke();
  }
}
drawChart('c1','#00e5ff','#ff2d95');
drawChart('c2','#b347d9');
</script>
</body>
</html>
