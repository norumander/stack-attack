<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack Attack — Diagnose Mode</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./cyberpunk-hud.css" />
  <link rel="stylesheet" href="./chatbot/chatbot-drawer.css" />
  <link rel="stylesheet" href="./auth/auth.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #0a1420; color: #ccddee; font-family: monospace; overflow: hidden; }
    #canvas-host { position: absolute; inset: 0; }
    .td-hud-mirror { display: none; }
    /*
     * Briefing narrative anchors to bottom-left so it doesn't overlap the
     * top-right HUD stack (BUDGET / PHASE / VIABILITY / briefing card). The
     * component palette sits bottom-center, so bottom-left is the empty
     * quadrant of the viewport.
     */
    #td-diagnose-briefing {
      position: fixed;
      top: 240px;
      left: 24px;
      max-width: 320px;
      padding: 14px 16px;
      background: rgba(30, 50, 80, 0.75);
      border: 1px solid rgba(94, 240, 255, 0.35);
      border-radius: 6px;
      color: #ccddee;
      font-size: 13px;
      line-height: 1.5;
      z-index: 10;
      pointer-events: none;
    }

    /* Loading screen — matches the campaign game.html overlay. Scanning
       orange chunk + cycling pico-8 flavor text. Dismissed by diagnose-boot.ts
       once the renderer is ready via `stackattack:ready`; safety timeout 12s. */
    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #1D2B53;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      transition: opacity 240ms ease-out;
    }
    .loading-screen.is-ready { opacity: 0; pointer-events: none; }
    .loading-text {
      font-family: "Press Start 2P", "Courier New", monospace;
      font-size: 14px;
      letter-spacing: 0.24em;
      color: #FFF1E8;
    }
    .loading-bar {
      position: relative;
      width: 280px;
      height: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 3px solid #000;
      box-shadow: 4px 4px 0 #7E2553;
      overflow: hidden;
    }
    .loading-bar-fill {
      position: absolute;
      top: 0;
      left: -28%;
      width: 28%;
      height: 100%;
      background: #FFA300;
      animation: cp-load-scan 1.6s steps(16, end) infinite;
    }
    @keyframes cp-load-scan {
      0%   { left: -28%; }
      50%  { left: 100%; }
      100% { left: -28%; }
    }
    .loading-bar.is-final .loading-bar-fill {
      animation: cp-load-finish 280ms ease-out forwards;
    }
    @keyframes cp-load-finish { to { left: 0; width: 100%; } }
    .loading-flavor {
      font-family: "Silkscreen", "VT323", "Courier New", monospace;
      font-size: 16px;
      color: #29ADFF;
      letter-spacing: 0.06em;
      margin-top: 2px;
      height: 22px;
      text-transform: uppercase;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div id="loading-screen" class="loading-screen" aria-hidden="true">
    <div class="loading-text">LOADING…</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    <div class="loading-flavor"></div>
  </div>

  <div id="canvas-host"></div>

  <!-- Inherited-system briefing card (distinct from campaign's build-from-scratch briefing). -->
  <div id="td-diagnose-briefing">Loading diagnose level…</div>

  <!-- Mirror divs used by the HUD / boot to communicate state. -->
  <div class="td-hud-mirror">
    <div id="td-hud-wave">Diagnose</div>
    <div id="td-hud-phase">build</div>
    <div id="td-hud-budget">$0</div>
    <div id="td-status">Loading…</div>

    <div id="td-topology-errors"></div>

    <div id="td-briefing-title">Diagnose Mode</div>
    <div id="td-briefing-traffic"></div>
    <div id="td-briefing-budget"></div>
    <div id="td-briefing-threshold"></div>
    <div id="td-briefing-components"></div>

    <div id="td-info-panel" hidden>
      <button id="td-info-panel-close">×</button>
      <div id="td-info-panel-header"></div>
      <div id="td-info-panel-description"></div>
      <ul id="td-info-panel-caps"></ul>
      <div id="td-info-panel-stats"></div>
      <button id="td-info-panel-details">DETAILS</button>
    </div>

    <button id="td-ready-btn">READY</button>

    <button class="td-palette-btn" data-type="server">+ Server $100</button>
    <button class="td-palette-btn" data-type="database">+ Database $200</button>
    <button class="td-palette-btn" data-type="data_cache">+ Data Cache $150</button>
    <button class="td-palette-btn" data-type="edge_cache">+ Edge Cache $175</button>
    <button class="td-palette-btn" data-type="load_balancer">+ Load Balancer $175</button>
    <button class="td-palette-btn" data-type="cdn">+ CDN $200</button>
    <button class="td-palette-btn" data-type="api_gateway">+ API Gateway $250</button>
    <button class="td-palette-btn" data-type="queue">+ Queue $125</button>
    <button class="td-palette-btn" data-type="worker">+ Worker $150</button>
    <button class="td-palette-btn" data-type="streaming_server">+ Streaming $250</button>
    <button class="td-palette-btn" data-type="blob_storage">+ Blob Storage $200</button>
    <button class="td-palette-btn" data-type="dns_gtm">+ DNS / GTM $200</button>
    <button class="td-palette-btn" data-type="circuit_breaker">+ Circuit Breaker $150</button>
  </div>

  <script type="module" src="./crt-overlay.ts"></script>
  <script type="module" src="./diagnose-boot.ts"></script>
  <script>
    // Dismiss the loading screen when diagnose-boot dispatches `stackattack:ready`,
    // OR after a 12s safety timeout. Cycles randomly-ordered flavor lines so
    // the variable boot time feels less dead.
    (function () {
      var screen = document.getElementById("loading-screen");
      if (!screen) return;
      var flavorEl = screen.querySelector(".loading-flavor");
      var bar = screen.querySelector(".loading-bar");

      var phrases = [
        "Inheriting the broken topology…",
        "Auditing the wires…",
        "Scanning for hot keys…",
        "Replaying the on-call ticket…",
        "Drawing iso tiles…",
        "Priming the cache…",
        "Diagnosing the bottleneck…",
        "Sharding databases…",
        "Waking up workers…",
        "Flushing DNS…",
        "Tuning the queue…",
        "Booting the CDN…",
        "Reconciling state…",
        "Buffering stream…",
        "Deploying edge nodes…",
        "Negotiating TLS…",
        "Replicating zones…",
        "Routing new traffic…",
        "Reticulating splines…",
        "Pinging the origin…",
      ];
      for (var i = phrases.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = phrases[i]; phrases[i] = phrases[j]; phrases[j] = tmp;
      }
      var pi = 0;
      if (flavorEl) flavorEl.textContent = phrases[0];
      var cycleInterval = setInterval(function () {
        pi = (pi + 1) % phrases.length;
        if (flavorEl) flavorEl.textContent = phrases[pi];
      }, 1300);

      var minDelay = new Promise(function (r) { setTimeout(r, 600); });
      var ready = new Promise(function (r) {
        var fired = false;
        function done() { if (!fired) { fired = true; r(); } }
        window.addEventListener("stackattack:ready", done, { once: true });
        setTimeout(done, 12000);
      });
      Promise.all([minDelay, ready]).then(function () {
        clearInterval(cycleInterval);
        if (flavorEl) flavorEl.textContent = "Ready!";
        if (bar) bar.classList.add("is-final");
        setTimeout(function () {
          screen.classList.add("is-ready");
          setTimeout(function () { screen.remove(); }, 280);
        }, 360);
      });
    })();
  </script>
</body>
</html>
