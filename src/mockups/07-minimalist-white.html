<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stack Attack — Minimalist White</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafafa;--surface:#ffffff;--border:#e0e0e0;--line:#111111;--text:#111111;--dim:#888888;--light:#bbbbbb;--red:#e53935;--green:#2e7d32;--accent:#111111}
body{background:var(--bg);color:var(--text);font-family:'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Top Bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar h1{font-size:0.9rem;font-weight:700;color:var(--text);letter-spacing:0.08em;text-transform:uppercase}
.topbar-stats{display:flex;gap:32px;font-size:0.75rem}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-label{color:var(--dim);font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
.stat-value{font-weight:600;font-size:0.8rem;color:var(--text)}
.stat-value.muted{color:var(--dim)}
.sla-ok{color:var(--green)}
.sla-ok::after{content:' \2713';font-size:0.7em}

/* Layout */
.main{display:grid;grid-template-columns:200px 1fr;grid-template-rows:1fr 180px;height:calc(100vh - 56px);gap:0}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 20px;display:flex;flex-direction:column;gap:4px}
.sidebar h2{font-size:0.6rem;font-weight:500;text-transform:uppercase;letter-spacing:0.15em;color:var(--dim);margin-bottom:12px}
.comp-tile{background:transparent;border:1px solid var(--border);border-radius:0;padding:10px 12px;cursor:pointer;transition:all 0.15s}
.comp-tile:hover{border-color:var(--line);background:rgba(0,0,0,0.02)}
.comp-tile .name{font-size:0.75rem;font-weight:600;color:var(--text)}
.comp-tile .cost{font-size:0.65rem;color:var(--dim);font-weight:400}
.ready-btn{margin-top:auto;padding:14px;background:var(--line);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;transition:background 0.15s}
.ready-btn:hover{background:#333}

/* Board */
.board{position:relative;overflow:hidden;background:var(--bg)}
.board svg.connections{width:100%;height:100%;position:absolute;inset:0;z-index:1}
.board svg.connections line{stroke:var(--line);stroke-width:1;opacity:0.2}
.board svg.connections line.active{opacity:0.5}

/* Nodes */
.node{position:absolute;background:var(--surface);border:1px solid var(--border);padding:6px 8px;transform:translate(-50%,-50%);z-index:2;width:80px;display:flex;flex-direction:column;align-items:center}
.node svg.icon{width:40px;height:40px;display:block}
.node .label{font-weight:600;font-size:9px;color:var(--text);white-space:nowrap;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px}
.node .health{height:2px;background:var(--border);margin-top:6px;overflow:hidden;width:100%}
.node .health-fill{height:100%;transition:width 0.3s}
.node .health-fill.good{background:var(--green)}
.node .health-fill.warn{background:var(--red)}
.node .health-fill.bad{background:var(--red)}
.node.client{border-color:var(--light)}
.node.db{border-color:var(--text)}
.node.cache{border-color:var(--dim)}

/* Charts */
.charts{grid-column:1/-1;background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 200px;gap:32px;padding:16px 32px}
.chart{position:relative}
.chart h3{font-size:0.55rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);margin-bottom:10px}
.chart canvas{width:100%;height:120px}
.gauge{display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-circle{width:96px;height:96px;border-radius:50%;border:2px solid var(--border);position:relative;display:flex;align-items:center;justify-content:center}
.gauge-arc{position:absolute;inset:4px;border-radius:50%;border:2px solid transparent;border-top-color:var(--green);border-right-color:var(--green);border-bottom-color:var(--green);animation:gauge-spin 5s linear infinite}
@keyframes gauge-spin{to{transform:rotate(360deg)}}
.gauge-value{font-size:1.4rem;font-weight:300;color:var(--text)}
.gauge-label{font-size:0.55rem;color:var(--dim);margin-top:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
</style>
</head>
<body>
<div class="topbar">
  <h1>Stack Attack</h1>
  <div class="topbar-stats">
    <div class="stat"><span class="stat-label">Wave</span><span class="stat-value">3 / 10</span></div>
    <div class="stat"><span class="stat-label">Phase</span><span class="stat-value">Build</span></div>
    <div class="stat"><span class="stat-label">Budget</span><span class="stat-value muted">$450</span></div>
    <div class="stat"><span class="stat-label">Availability</span><span class="stat-value sla-ok">95.2%</span></div>
    <div class="stat"><span class="stat-label">Latency</span><span class="stat-value sla-ok">3.2</span></div>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <h2>Components</h2>
    <div class="comp-tile"><div class="name">Server</div><div class="cost">$100</div></div>
    <div class="comp-tile"><div class="name">Database</div><div class="cost">$200</div></div>
    <div class="comp-tile"><div class="name">Cache</div><div class="cost">$150</div></div>
    <div class="comp-tile"><div class="name">Load Balancer</div><div class="cost">$175</div></div>
    <div class="comp-tile"><div class="name">CDN</div><div class="cost">$200</div></div>
    <div class="comp-tile"><div class="name">API Gateway</div><div class="cost">$250</div></div>
    <div class="comp-tile"><div class="name">Queue</div><div class="cost">$125</div></div>
    <button class="ready-btn">Ready</button>
  </div>
  <div class="board">
    <svg class="connections">
      <line x1="13%" y1="50%" x2="34%" y2="50%" class="active"/>
      <line x1="34%" y1="50%" x2="57%" y2="33%"/>
      <line x1="34%" y1="50%" x2="57%" y2="67%"/>
      <line x1="57%" y1="33%" x2="82%" y2="50%"/>
      <line x1="57%" y1="67%" x2="82%" y2="50%"/>
      <line x1="34%" y1="50%" x2="34%" y2="18%" style="opacity:0.12"/>
    </svg>

    <!-- Client: monitor/screen -->
    <div class="node client" style="left:13%;top:50%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="6" width="32" height="22" rx="0" stroke="#111" stroke-width="1"/>
        <line x1="14" y1="32" x2="26" y2="32" stroke="#111" stroke-width="1"/>
        <line x1="20" y1="28" x2="20" y2="32" stroke="#111" stroke-width="1"/>
      </svg>
      <div class="label">Client</div>
      <div class="health"><div class="health-fill good" style="width:100%"></div></div>
    </div>

    <!-- Load Balancer: diamond with split arrows -->
    <div class="node" style="left:34%;top:50%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,4 36,20 20,36 4,20" stroke="#111" stroke-width="1" fill="none"/>
        <line x1="20" y1="20" x2="11" y2="29" stroke="#111" stroke-width="1"/>
        <line x1="20" y1="20" x2="29" y2="29" stroke="#111" stroke-width="1"/>
        <polygon points="9,28 11,29 13,26" fill="#111" opacity="0.6"/>
        <polygon points="27,26 29,29 31,28" fill="#111" opacity="0.6"/>
      </svg>
      <div class="label">Load Balancer</div>
      <div class="health"><div class="health-fill good" style="width:100%"></div></div>
    </div>

    <!-- Server 1: rack server -->
    <div class="node" style="left:57%;top:33%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="4" width="28" height="32" rx="0" stroke="#111" stroke-width="1"/>
        <line x1="6" y1="12" x2="34" y2="12" stroke="#111" stroke-width="0.75"/>
        <line x1="6" y1="20" x2="34" y2="20" stroke="#111" stroke-width="0.75"/>
        <line x1="6" y1="28" x2="34" y2="28" stroke="#111" stroke-width="0.75"/>
        <circle cx="30" cy="8" r="1" fill="#111" opacity="0.4"/>
        <circle cx="30" cy="16" r="1" fill="#111" opacity="0.4"/>
        <circle cx="30" cy="24" r="1" fill="#111" opacity="0.4"/>
      </svg>
      <div class="label">Server 1</div>
      <div class="health"><div class="health-fill good" style="width:92%"></div></div>
    </div>

    <!-- Server 2: rack server with "2" badge -->
    <div class="node" style="left:57%;top:67%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="4" width="28" height="32" rx="0" stroke="#111" stroke-width="1"/>
        <line x1="6" y1="12" x2="34" y2="12" stroke="#111" stroke-width="0.75"/>
        <line x1="6" y1="20" x2="34" y2="20" stroke="#111" stroke-width="0.75"/>
        <line x1="6" y1="28" x2="34" y2="28" stroke="#111" stroke-width="0.75"/>
        <circle cx="30" cy="8" r="1" fill="#111" opacity="0.4"/>
        <circle cx="30" cy="16" r="1" fill="#111" opacity="0.4"/>
        <circle cx="30" cy="24" r="1" fill="#111" opacity="0.4"/>
        <!-- "2" badge -->
        <rect x="27" y="29" width="8" height="8" rx="0" stroke="#111" stroke-width="0.75" fill="#111"/>
        <text x="31" y="35.5" text-anchor="middle" font-family="DM Sans,sans-serif" font-weight="600" font-size="7" fill="#fafafa">2</text>
      </svg>
      <div class="label">Server 2</div>
      <div class="health"><div class="health-fill warn" style="width:65%"></div></div>
    </div>

    <!-- Database: cylinder -->
    <div class="node db" style="left:82%;top:50%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="20" cy="10" rx="14" ry="5" stroke="#111" stroke-width="1"/>
        <line x1="6" y1="10" x2="6" y2="30" stroke="#111" stroke-width="1"/>
        <line x1="34" y1="10" x2="34" y2="30" stroke="#111" stroke-width="1"/>
        <ellipse cx="20" cy="30" rx="14" ry="5" stroke="#111" stroke-width="1"/>
        <ellipse cx="20" cy="20" rx="14" ry="5" stroke="#111" stroke-width="0.5" opacity="0.25"/>
      </svg>
      <div class="label">Database</div>
      <div class="health"><div class="health-fill good" style="width:88%"></div></div>
    </div>

    <!-- Cache: lightning bolt in circle -->
    <div class="node cache" style="left:34%;top:18%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="16" stroke="#111" stroke-width="1"/>
        <polygon points="22,6 14,22 19,22 16,34 28,18 22,18" stroke="#111" stroke-width="1" fill="none" stroke-linejoin="miter"/>
      </svg>
      <div class="label">Cache</div>
      <div class="health"><div class="health-fill good" style="width:100%"></div></div>
    </div>
  </div>
  <div class="charts">
    <div class="chart">
      <h3>Throughput</h3>
      <canvas id="c1"></canvas>
    </div>
    <div class="chart">
      <h3>Latency</h3>
      <canvas id="c2"></canvas>
    </div>
    <div class="gauge">
      <div class="gauge-circle"><div class="gauge-arc"></div><span class="gauge-value">95%</span></div>
      <div class="gauge-label">Reliability</div>
    </div>
  </div>
</div>
<script>
function drawChart(id,color1,color2){
  const c=document.getElementById(id),ctx=c.getContext('2d');
  c.width=c.offsetWidth*2;c.height=240;ctx.scale(2,1);
  const w=c.offsetWidth,h=120;
  const pts=Array.from({length:50},(_,i)=>Math.sin(i*0.3)*20+50+Math.random()*10);
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=0.5;
  for(let y=0;y<h;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
  ctx.beginPath();ctx.moveTo(0,h);
  pts.forEach((p,i)=>{ctx.lineTo(i*(w/50),h-p)});
  ctx.lineTo(w,h);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,color1+'18');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();pts.forEach((p,i)=>{i?ctx.lineTo(i*(w/50),h-p):ctx.moveTo(0,h-p)});
  ctx.strokeStyle=color1;ctx.lineWidth=1.5;ctx.stroke();
  if(color2){
    const pts2=Array.from({length:50},(_,i)=>Math.sin(i*0.5+1)*8+15+Math.random()*5);
    ctx.beginPath();pts2.forEach((p,i)=>{i?ctx.lineTo(i*(w/50),h-p):ctx.moveTo(0,h-p)});
    ctx.strokeStyle=color2;ctx.lineWidth=1;ctx.stroke();
  }
}
drawChart('c1','#111111','#e53935');
drawChart('c2','#888888');
</script>
</body>
</html>
