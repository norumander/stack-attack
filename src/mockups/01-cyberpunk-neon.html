<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stack Attack — Cyberpunk Neon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a12;--surface:#12121f;--border:#1a1a2e;--cyan:#00f0ff;--magenta:#ff00aa;--purple:#8b5cf6;--yellow:#facc15;--green:#00ff88;--red:#ff3366;--text:#e0e0f0;--dim:#5a5a8a}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,240,255,0.03) 2px,rgba(0,240,255,0.03) 4px);pointer-events:none;z-index:9999}

/* Top Bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(180deg,rgba(0,240,255,0.08),transparent);border-bottom:1px solid rgba(0,240,255,0.2)}
.topbar h1{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;background:linear-gradient(90deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 30px rgba(0,240,255,0.3)}
.topbar-stats{display:flex;gap:20px;font-size:0.75rem}
.stat{display:flex;flex-direction:column;align-items:center}
.stat-label{color:var(--dim);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em}
.stat-value{font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.85rem}
.stat-value.cyan{color:var(--cyan);text-shadow:0 0 10px rgba(0,240,255,0.5)}
.stat-value.magenta{color:var(--magenta);text-shadow:0 0 10px rgba(255,0,170,0.5)}
.stat-value.green{color:var(--green);text-shadow:0 0 10px rgba(0,255,136,0.5)}
.stat-value.yellow{color:var(--yellow)}
.sla-ok{color:var(--green)}
.sla-ok::after{content:' \2713'}

/* Layout */
.main{display:grid;grid-template-columns:200px 1fr;grid-template-rows:1fr 180px;height:calc(100vh - 52px);gap:0}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:8px}
.sidebar h2{font-family:'Orbitron',sans-serif;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--cyan);margin-bottom:8px}
.comp-tile{background:rgba(0,240,255,0.05);border:1px solid rgba(0,240,255,0.15);border-radius:4px;padding:10px;cursor:pointer;transition:all 0.2s}
.comp-tile:hover{background:rgba(0,240,255,0.12);border-color:var(--cyan);box-shadow:0 0 15px rgba(0,240,255,0.2)}
.comp-tile .name{font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:700;color:var(--cyan)}
.comp-tile .cost{font-size:0.65rem;color:var(--magenta)}
.ready-btn{margin-top:auto;padding:14px;background:linear-gradient(135deg,var(--cyan),var(--magenta));color:var(--bg);border:none;border-radius:4px;font-family:'Orbitron',sans-serif;font-weight:900;font-size:0.85rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;position:relative;overflow:hidden}
.ready-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transform:translateX(-100%);animation:shimmer 2s infinite}
@keyframes shimmer{to{transform:translateX(100%)}}

/* Board */
.board{background:var(--bg);position:relative;overflow:hidden}
.board::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(0,240,255,0.08) 1px,transparent 0);background-size:40px 40px}
.board svg.connections{width:100%;height:100%;position:absolute;inset:0}
.board svg.connections line{stroke:rgba(0,240,255,0.3);stroke-width:2}
.board svg.connections line.active{animation:line-glow 1.5s ease-in-out infinite alternate}
@keyframes line-glow{from{stroke:rgba(0,240,255,0.3);stroke-width:2}to{stroke:rgba(0,240,255,0.8);stroke-width:3}}

/* Icon Nodes */
.node{position:absolute;transform:translate(-50%,-50%);z-index:2;display:flex;flex-direction:column;align-items:center;width:80px;height:70px;cursor:pointer}
.node svg.icon{width:40px;height:40px;flex-shrink:0}
.node .label{font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.5rem;color:var(--cyan);white-space:nowrap;margin-top:3px;text-shadow:0 0 8px rgba(0,240,255,0.4)}
.node .health{height:4px;width:60px;background:rgba(0,240,255,0.1);border-radius:2px;margin-top:3px;overflow:hidden}
.node .health-fill{height:100%;border-radius:2px;transition:width 0.3s}
.node .health-fill.good{background:var(--green);box-shadow:0 0 6px rgba(0,255,136,0.5)}
.node .health-fill.warn{background:var(--yellow);box-shadow:0 0 6px rgba(250,204,21,0.5)}
.node .health-fill.bad{background:var(--red);box-shadow:0 0 6px rgba(255,51,102,0.5)}
.node.db .label{color:var(--purple);text-shadow:0 0 8px rgba(139,92,246,0.4)}
.node.cache .label{color:var(--yellow);text-shadow:0 0 8px rgba(250,204,21,0.4)}

/* Particles */
.particle{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);z-index:3;animation:particle-move 2s linear infinite}
@keyframes particle-move{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:0}}

/* Charts */
.charts{grid-column:1/-1;background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 200px;gap:1px;padding:12px 16px}
.chart{position:relative}
.chart h3{font-family:'Orbitron',sans-serif;font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim);margin-bottom:8px}
.chart canvas{width:100%;height:120px}
.gauge{display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-circle{width:100px;height:100px;border-radius:50%;border:3px solid var(--border);position:relative;display:flex;align-items:center;justify-content:center}
.gauge-circle::before{content:'';position:absolute;inset:4px;border-radius:50%;border:3px solid transparent;border-top-color:var(--green);border-right-color:var(--green);border-bottom-color:var(--green);animation:gauge-spin 3s linear infinite}
@keyframes gauge-spin{to{transform:rotate(360deg)}}
.gauge-value{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;color:var(--green);text-shadow:0 0 15px rgba(0,255,136,0.4)}
.gauge-label{font-size:0.6rem;color:var(--dim);margin-top:6px;text-transform:uppercase;letter-spacing:0.1em}
</style>
</head>
<body>
<div class="topbar">
  <h1>STACK ATTACK</h1>
  <div class="topbar-stats">
    <div class="stat"><span class="stat-label">Wave</span><span class="stat-value cyan">3 / 10</span></div>
    <div class="stat"><span class="stat-label">Phase</span><span class="stat-value magenta">BUILD</span></div>
    <div class="stat"><span class="stat-label">Budget</span><span class="stat-value yellow">$450</span></div>
    <div class="stat"><span class="stat-label">Availability</span><span class="stat-value sla-ok">95.2%</span></div>
    <div class="stat"><span class="stat-label">Latency</span><span class="stat-value sla-ok">3.2</span></div>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <h2>Components</h2>
    <div class="comp-tile"><div class="name">Server</div><div class="cost">$100</div></div>
    <div class="comp-tile"><div class="name">Database</div><div class="cost">$200</div></div>
    <div class="comp-tile"><div class="name">Cache</div><div class="cost">$150</div></div>
    <div class="comp-tile"><div class="name">Load Balancer</div><div class="cost">$175</div></div>
    <div class="comp-tile"><div class="name">CDN</div><div class="cost">$200</div></div>
    <div class="comp-tile"><div class="name">API Gateway</div><div class="cost">$250</div></div>
    <div class="comp-tile"><div class="name">Queue</div><div class="cost">$125</div></div>
    <button class="ready-btn">&#9654; READY</button>
  </div>
  <div class="board">
    <!-- Glow filter definitions -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="neon-glow-purple" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="neon-glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>
    </svg>

    <!-- Connection lines -->
    <svg class="connections">
      <line x1="13%" y1="50%" x2="34%" y2="50%" class="active"/>
      <line x1="34%" y1="50%" x2="57%" y2="33%"/>
      <line x1="34%" y1="50%" x2="57%" y2="67%"/>
      <line x1="57%" y1="33%" x2="82%" y2="50%"/>
      <line x1="57%" y1="67%" x2="82%" y2="50%"/>
      <line x1="34%" y1="50%" x2="34%" y2="18%" style="stroke:rgba(250,204,21,0.3)"/>
    </svg>

    <!-- CLIENT: Monitor/screen -->
    <div class="node" style="left:13%;top:50%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#neon-glow)">
        <rect x="5" y="4" width="30" height="22" rx="2" stroke="#00f0ff" stroke-width="2"/>
        <line x1="12" y1="30" x2="28" y2="30" stroke="#00f0ff" stroke-width="2"/>
        <line x1="20" y1="26" x2="20" y2="30" stroke="#00f0ff" stroke-width="2"/>
        <rect x="9" y="8" width="22" height="14" rx="1" fill="rgba(0,240,255,0.08)"/>
        <line x1="12" y1="13" x2="22" y2="13" stroke="#00f0ff" stroke-width="0.8" opacity="0.5"/>
        <line x1="12" y1="16" x2="18" y2="16" stroke="#00f0ff" stroke-width="0.8" opacity="0.3"/>
      </svg>
      <div class="label">CLIENT</div>
      <div class="health"><div class="health-fill good" style="width:100%"></div></div>
    </div>

    <!-- LOAD BALANCER: Diamond with split arrows -->
    <div class="node" style="left:34%;top:50%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#neon-glow)">
        <polygon points="20,3 37,20 20,37 3,20" stroke="#00f0ff" stroke-width="2" fill="rgba(0,240,255,0.06)"/>
        <line x1="20" y1="20" x2="8" y2="14" stroke="#00f0ff" stroke-width="1.5"/>
        <line x1="20" y1="20" x2="8" y2="26" stroke="#00f0ff" stroke-width="1.5"/>
        <line x1="20" y1="20" x2="32" y2="14" stroke="#00f0ff" stroke-width="1.5"/>
        <line x1="20" y1="20" x2="32" y2="26" stroke="#00f0ff" stroke-width="1.5"/>
        <polygon points="6,13 10,14 8,17" fill="#00f0ff"/>
        <polygon points="6,27 10,26 8,23" fill="#00f0ff"/>
        <polygon points="34,13 30,14 32,17" fill="#00f0ff"/>
        <polygon points="34,27 30,26 32,23" fill="#00f0ff"/>
      </svg>
      <div class="label">LOAD BALANCER</div>
      <div class="health"><div class="health-fill good" style="width:100%"></div></div>
    </div>

    <!-- SERVER 1: Rack server -->
    <div class="node" style="left:57%;top:33%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#neon-glow)">
        <rect x="6" y="3" width="28" height="34" rx="2" stroke="#00f0ff" stroke-width="2" fill="rgba(0,240,255,0.05)"/>
        <line x1="6" y1="14" x2="34" y2="14" stroke="#00f0ff" stroke-width="1"/>
        <line x1="6" y1="25" x2="34" y2="25" stroke="#00f0ff" stroke-width="1"/>
        <rect x="10" y="7" width="16" height="3" rx="1" fill="rgba(0,240,255,0.15)" stroke="#00f0ff" stroke-width="0.5"/>
        <rect x="10" y="18" width="16" height="3" rx="1" fill="rgba(0,240,255,0.15)" stroke="#00f0ff" stroke-width="0.5"/>
        <rect x="10" y="29" width="16" height="3" rx="1" fill="rgba(0,240,255,0.15)" stroke="#00f0ff" stroke-width="0.5"/>
        <circle cx="30" cy="8.5" r="1.5" fill="#00ff88"/>
        <circle cx="30" cy="19.5" r="1.5" fill="#00ff88"/>
        <circle cx="30" cy="30.5" r="1.5" fill="#00ff88"/>
      </svg>
      <div class="label">SERVER 1</div>
      <div class="health"><div class="health-fill good" style="width:92%"></div></div>
    </div>

    <!-- SERVER 2: Rack server with "2" badge -->
    <div class="node" style="left:57%;top:67%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#neon-glow)">
        <rect x="6" y="3" width="28" height="34" rx="2" stroke="#00f0ff" stroke-width="2" fill="rgba(0,240,255,0.05)"/>
        <line x1="6" y1="14" x2="34" y2="14" stroke="#00f0ff" stroke-width="1"/>
        <line x1="6" y1="25" x2="34" y2="25" stroke="#00f0ff" stroke-width="1"/>
        <rect x="10" y="7" width="16" height="3" rx="1" fill="rgba(0,240,255,0.15)" stroke="#00f0ff" stroke-width="0.5"/>
        <rect x="10" y="18" width="16" height="3" rx="1" fill="rgba(0,240,255,0.15)" stroke="#00f0ff" stroke-width="0.5"/>
        <rect x="10" y="29" width="16" height="3" rx="1" fill="rgba(0,240,255,0.15)" stroke="#00f0ff" stroke-width="0.5"/>
        <circle cx="30" cy="8.5" r="1.5" fill="#facc15"/>
        <circle cx="30" cy="19.5" r="1.5" fill="#facc15"/>
        <circle cx="30" cy="30.5" r="1.5" fill="#facc15"/>
        <!-- "2" badge -->
        <circle cx="33" cy="33" r="5" fill="#ff00aa" stroke="#00f0ff" stroke-width="1"/>
        <text x="33" y="36" text-anchor="middle" fill="#fff" font-family="Orbitron,sans-serif" font-size="7" font-weight="900">2</text>
      </svg>
      <div class="label">SERVER 2</div>
      <div class="health"><div class="health-fill warn" style="width:65%"></div></div>
    </div>

    <!-- DATABASE: Cylinder -->
    <div class="node db" style="left:82%;top:50%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#neon-glow-purple)">
        <ellipse cx="20" cy="8" rx="14" ry="5" stroke="#8b5cf6" stroke-width="2" fill="rgba(139,92,246,0.1)"/>
        <line x1="6" y1="8" x2="6" y2="32" stroke="#8b5cf6" stroke-width="2"/>
        <line x1="34" y1="8" x2="34" y2="32" stroke="#8b5cf6" stroke-width="2"/>
        <ellipse cx="20" cy="32" rx="14" ry="5" stroke="#8b5cf6" stroke-width="2" fill="rgba(139,92,246,0.1)"/>
        <ellipse cx="20" cy="20" rx="14" ry="5" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
        <line x1="12" y1="14" x2="28" y2="14" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
        <line x1="10" y1="26" x2="30" y2="26" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
      </svg>
      <div class="label">DATABASE</div>
      <div class="health"><div class="health-fill good" style="width:88%"></div></div>
    </div>

    <!-- CACHE: Lightning bolt in circle -->
    <div class="node cache" style="left:34%;top:18%">
      <svg class="icon" viewBox="0 0 40 40" fill="none" filter="url(#neon-glow-yellow)">
        <circle cx="20" cy="20" r="17" stroke="#facc15" stroke-width="2" fill="rgba(250,204,21,0.06)"/>
        <polygon points="22,5 13,22 19,22 17,36 27,18 21,18" fill="#facc15" stroke="#facc15" stroke-width="0.5" stroke-linejoin="round"/>
      </svg>
      <div class="label">CACHE</div>
      <div class="health"><div class="health-fill good" style="width:100%"></div></div>
    </div>
  </div>
  <div class="charts">
    <div class="chart">
      <h3>Throughput</h3>
      <canvas id="c1"></canvas>
    </div>
    <div class="chart">
      <h3>Latency</h3>
      <canvas id="c2"></canvas>
    </div>
    <div class="gauge">
      <div class="gauge-circle"><span class="gauge-value">95%</span></div>
      <div class="gauge-label">Reliability</div>
    </div>
  </div>
</div>
<script>
function drawChart(id,color1,color2){
  const c=document.getElementById(id),ctx=c.getContext('2d');
  c.width=c.offsetWidth*2;c.height=240;ctx.scale(2,1);
  const w=c.offsetWidth,h=120;
  const pts=Array.from({length:50},(_,i)=>Math.sin(i*0.3)*20+50+Math.random()*10);
  ctx.beginPath();ctx.moveTo(0,h);
  pts.forEach((p,i)=>{ctx.lineTo(i*(w/50),h-p)});
  ctx.lineTo(w,h);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,color1+'44');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();pts.forEach((p,i)=>{i?ctx.lineTo(i*(w/50),h-p):ctx.moveTo(0,h-p)});
  ctx.strokeStyle=color1;ctx.lineWidth=2;ctx.stroke();
  if(color2){
    const pts2=Array.from({length:50},(_,i)=>Math.sin(i*0.5+1)*8+15+Math.random()*5);
    ctx.beginPath();pts2.forEach((p,i)=>{i?ctx.lineTo(i*(w/50),h-p):ctx.moveTo(0,h-p)});
    ctx.strokeStyle=color2;ctx.lineWidth=1.5;ctx.stroke();
  }
}
drawChart('c1','#00ff88','#ff3366');
drawChart('c2','#8b5cf6');
</script>
</body>
</html>
